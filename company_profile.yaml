# ---------------------------------------------------------------------------
# Filtros de triaje — ajustables sin tocar código
# ---------------------------------------------------------------------------
# Mueve cualquier criterio entre hard_blockers e items de soft_flags según la
# estrategia comercial del momento.  Los cambios surten efecto en la próxima
# ejecución del pipeline (sin reiniciar Dagster).
#
# Criterios disponibles:
#   place_of_execution_not_asturias       → Lugar de ejecución fuera de Asturias
#   execution_period_under_2_months       → Plazo de ejecución menor de 2 meses
#   maintenance_longer_than_1_year        → Mantenimiento durante más de un año
#   asks_technical_assistance_service     → Servicio de asistencia técnica
#   iso_certification_required            → Certificación ISO requerida
#   ens_certification_required            → Certificación ENS requerida
#   pmi_certified_profile_required        → Perfil con certificación PMI requerido
#   economic_offer_weight_over_70_points  → Oferta económica con más de 70 puntos
# ---------------------------------------------------------------------------
triage_filters:

  # Descarte automático: la licitación se marca potential_discard sin llamar al LLM.
  hard_blockers:
    - place_of_execution_not_asturias       # Lugar de ejecución fuera de Asturias
    - execution_period_under_2_months       # Plazo de ejecución menor de 2 meses
    - maintenance_longer_than_1_year        # Mantenimiento durante más de un año
    - asks_technical_assistance_service     # Servicio de asistencia técnica
    - iso_certification_required            # Certificación ISO requerida
    - ens_certification_required            # Certificación ENS requerida
    - pmi_certified_profile_required        # Perfil con certificación PMI requerido
    - economic_offer_weight_over_70_points  # Oferta económica con más de 70 puntos

  # Penalización suave: reducen la puntuación pero no descartan automáticamente.
  soft_flags:
    penalty_per_flag: 1.5   # puntos descontados por cada criterio activo
    items: []
    # Ejemplo — para activar un criterio como flag suave en lugar de bloqueante duro:
    # items:
    #   - iso_certification_required   # Certificación ISO requerida
