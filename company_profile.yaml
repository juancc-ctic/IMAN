# ---------------------------------------------------------------------------
# Filtros de licitación — controla qué licitaciones se descargan del portal.
# Edita estas listas para ampliar o restringir los tipos de contratos que
# el sistema procesa. Los cambios surten efecto en la próxima ejecución.
# ---------------------------------------------------------------------------
tender_filters:

  # Estados del expediente que se aceptan.
  #   PRE — preanuncio (antes de publicación oficial)
  #   PUB — publicada y activa
  contract_folder_statuses:
    - "PRE"
    - "PUB"

  # Tipos de contrato aceptados (OR). Null = aceptar todos.
  contract_type_codes:
    - "2" # Servicios
    - "1" # Suministros
    - ""

  # Subtipos de servicio aceptados. Elimina un código para excluir ese subtipo
  # o añade nuevos si quieres ampliar la búsqueda.
  #   5  — Tecnologías de la información y comunicaciones (TIC)
  #   7  — Investigación y desarrollo
  #   8  — Consultoría de gestión y afines
  #   9  — Informática y servicios conexos
  #   11 — Servicios de elaboración de datos
  #   12 — Consultoría de proyectos
  #   20 — Enseñanza y formación profesional
  #   23 — Servicios sociales y de salud
  #   24 — Servicios sociales
  #   25 — Servicios sanitarios y veterinarios
  #   27 — Otros servicios
  contract_subtype_codes:  # null — accept every subtype code
    - "5"   # Tecnologías de la información y comunicaciones (TIC)
    - "7"   # Investigación y desarrollo
    - "8"   # Consultoría de gestión y afines
    - "9"   # Informática y servicios conexos
    - "11"  # Servicios de elaboración de datos
    - "12"  # Consultoría de proyectos
    - "20"  # Enseñanza y formación profesional
    - "23"  # Servicios sociales y de salud
    - "24"  # Servicios sociales
    - "25"  # Servicios sanitarios y veterinarios
    - "27"  # Otros servicios

  # Filtros CPV (OR). Cadenas cortas actúan como prefijos ("72" = todos los TI),
  # cadenas de 8 dígitos actúan como códigos exactos ("72212461").
  # Deja la clave ausente o vacía para aceptar cualquier categoría.
  cpv_filters:
    - "72"   # CPV 72xxxxxx — Servicios de tecnologías de la información
    - "80"   # CPV 80xxxxxx — Servicios de educación y formación

# ---------------------------------------------------------------------------
# Perfiles por prefijo CPV — sobreescriben interest_areas, company_fields,
# past_tender_categories y/o triage_dimensions para licitaciones cuyo código
# CPV empieza por alguno de los prefijos indicados. El primer perfil que
# coincida gana. Omite una clave para heredar el valor global.
#
# Usa cpv_prefix (cadena) para un único prefijo, o cpv_prefixes (lista) para
# asignar varios prefijos al mismo perfil:
#   - cpv_prefix: "72"          # un solo prefijo
#   - cpv_prefixes: ["72", "73"] # varios prefijos comparten el mismo perfil
#
# Ausencia de esta sección = un único perfil global para todos los contratos.
# ---------------------------------------------------------------------------
cpv_profiles:

  # -------------------------------------------------------------------
  # CPV 72xx — Servicios de tecnologías de la información
  # Hereda interest_areas y company_fields globales. Solo sobreescribe
  # las descripciones de las dimensiones para enfocarlas en TIC/IA/IoT.
  # -------------------------------------------------------------------
  - cpv_prefix: ["72", "48900000"]
    triage_dimensions:
      - name: "Alineación temática"
        weight: 2.0
        description: >
          En qué medida el objeto del contrato encaja con las capacidades tecnológicas
          de la empresa: inteligencia artificial, machine learning, IoT, computación
          cuántica, espacios de datos, ciberseguridad, plataformas digitales,
          realidad aumentada/mixta o sistemas GIS. Puntúa más alto cuanto mayor sea
          la superposición con las líneas tecnológicas estratégicas.

      - name: "Encaje de ámbito"
        weight: 1.0
        description: >
          Si el contrato pertenece a los campos TIC, I+D+i, inteligencia artificial,
          IoT, consultoría tecnológica o estándares web declarados por la empresa.
          Penaliza si el ámbito es puramente administrativo o de mantenimiento
          sin componente tecnológica relevante.

      - name: "Condiciones de ejecución"
        weight: 1.0
        description: >
          Idoneidad global del contrato. Considera el lugar de ejecución (penaliza
          fuera de Asturias), el plazo (penaliza menos de 2 meses), la carga de
          mantenimiento (penaliza más de 1 año o asistencia técnica pura), y la
          viabilidad técnica: si los perfiles y certificaciones requeridos (ISO,
          ENS, PMI u otros) coinciden con las capacidades internas habituales.

      - name: "Criterios de valoración"
        weight: 1.0
        description: >
          Si los criterios de adjudicación favorecen la calidad técnica sobre el
          precio. Penaliza cuando el peso del precio supera el 50 % de la
          puntuación total, ya que reduce el margen de diferenciación técnica
          en propuestas TIC de alta complejidad.

  # -------------------------------------------------------------------
  # CPV 80xx — Servicios de educación y formación
  # Sobreescribe interest_areas con foco en capacitación digital y
  # adapta las dimensiones al contexto formativo.
  # -------------------------------------------------------------------
  - cpv_prefix: "80"
    interest_areas:
      - "Formación en competencias digitales para empleados públicos y empresas"
      - "Diseño y desarrollo de programas de capacitación en inteligencia artificial y datos"
      - "Formación en ciberseguridad, ENS y cumplimiento normativo (RGPD)"
      - "Capacitación en transformación digital de administraciones públicas y PYMES"
      - "Formación en IoT, computación en la nube y arquitecturas distribuidas"
      - "Programas de upskilling y reskilling en tecnologías emergentes"
      - "Diseño de materiales didácticos y entornos virtuales de aprendizaje (LMS, e-learning)"
      - "Formación en estándares web, accesibilidad (WCAG) y tecnologías abiertas"
      - "Talleres y laboratorios de innovación tecnológica (living labs, hackathons)"

    past_tender_categories:
      - "Formación en competencias digitales para empleados públicos"
      - "Cursos y talleres de inteligencia artificial aplicada"
      - "Programas de ciberseguridad y ENS para administraciones"
      - "Diseño de itinerarios formativos en transformación digital"
      - "Desarrollo de plataformas e-learning y contenidos multimedia"
      - "Formación técnica en IoT, cloud y arquitecturas de datos"
      - "Capacitación en accesibilidad web y estándares W3C"

    triage_dimensions:
      - name: "Alineación temática"
        weight: 2.0
        description: >
          En qué medida el programa formativo encaja con las áreas de capacitación
          de la empresa: competencias digitales, IA aplicada, ciberseguridad, IoT,
          transformación digital, accesibilidad web o tecnologías emergentes.
          Puntúa más alto cuanto más específico y técnico sea el contenido formativo
          en relación con las líneas estratégicas de la empresa.

      - name: "Encaje de ámbito"
        weight: 1.0
        description: >
          Si el contrato formativo entra dentro de los campos de negocio declarados:
          formación y capacitación tecnológica, TIC, I+D+i o transferencia de
          conocimiento. Penaliza si es formación genérica no tecnológica (idiomas,
          habilidades blandas sin componente digital, PRL básico, etc.).

      - name: "Condiciones de ejecución"
        weight: 1.0
        description: >
          Idoneidad del contrato formativo. Considera el lugar de impartición
          (penaliza fuera de Asturias salvo modalidad online), la duración
          (penaliza acciones muy cortas de menos de 8 horas o contratos de
          asistencia técnica permanente), y si los perfiles docentes requeridos
          (certificaciones pedagógicas, habilitaciones específicas) son asumibles
          internamente.

      - name: "Criterios de valoración"
        weight: 1.0
        description: >
          Si los criterios de adjudicación valoran la calidad metodológica y la
          experiencia formativa sobre el precio. Penaliza cuando el peso del precio
          supera el 50 % o cuando no se valoran aspectos como metodología, materiales
          o cualificación del equipo docente.

# ---------------------------------------------------------------------------
# Dimensiones de triaje — el LLM puntúa cada dimensión de 0 a 5.
# Añade, elimina o edita dimensiones según la estrategia comercial.
# Los cambios surten efecto en la próxima ejecución (sin reiniciar Dagster).
# ---------------------------------------------------------------------------
triage_dimensions:
  - name: "Alineación temática"
    weight: 2.0
    description: >
      En qué medida el objeto y alcance de la licitación encajan con las áreas
      de interés estratégico de la empresa (IA, IoT, transformación digital,
      computación cuántica, salud digital, energía inteligente, etc.).

  - name: "Encaje de ámbito"
    weight: 1.0
    description: >
      Si el dominio de la licitación pertenece a uno o más campos de negocio
      declarados por la empresa (TIC, I+D+i, consultoría tecnológica, formación
      digital, estándares web, etc.).

  - name: "Condiciones de ejecución"
    weight: 1.0
    description: >
      Idoneidad global del contrato para la empresa. Considera el lugar de
      ejecución (penaliza fuera de Asturias), el plazo (penaliza menos de 2
      meses), la carga de mantenimiento (penaliza más de 1 año o asistencia
      técnica pura), y la viabilidad técnica: si los perfiles y certificaciones
      requeridos (ISO, ENS, PMI u otros) coinciden con las capacidades internas
      habituales de la empresa.

  - name: "Criterios de valoración"
    weight: 1.0
    description: >
      Si los criterios de adjudicación favorecen la calidad técnica sobre el
      precio. Penaliza cuando el peso del precio supera el 50 % de la
      puntuación total, lo que reduce el margen de diferenciación técnica.

# ---------------------------------------------------------------------------
# Plan de Acción CTIC 2025 — texto completo usado para calcular similitud
# coseno con licitaciones y convocatorias europeas. Edita libremente.
# ---------------------------------------------------------------------------
action_plan_text: |
  ### Relevant Themes:
  1. **Intelligence Artificial (IA)**:
     - IA predictiva y de simulación
     - IA generativa y modelos fundacionales
     - IA adaptativa, cognitiva
     - IA agéntica
     - Tecnologías del Lenguaje Natural (PLN)
     - IA para detección de amenazas y anomalías
     - Explicabilidad y transparencia algorítmica
     - Protección frente a ataques adversarios en modelos de IA
     - Quantum Machine Learning

  2. **Internet of Things (IoT)**:
     - Internet de las Cosas (IoT) y sistemas embebidos
     - Edge Computing con IA
     - Datos satelitales
     - Sensorización avanzada
     - Seguridad en dispositivos IoT (firmware seguro, autenticación robusta)
     - Protección de datos en entornos Edge
     - Criptografía post-cuántica

  3. **Comunicación de Datos**:
     - Redes LoRaWAN
     - Conectividad 5G/6G y M2M
     - Comunicaciones satelitales (constelaciones satélites órbita baja)
     - Protocolos seguros de comunicación
     - Gestión de identidades y autenticación de redes
     - Redes privadas de comunicaciones en entornos industriales y corporativos
     - Comunicaciones cuánticas

  4. **Arquitecturas Avanzadas**:
     - Cloud Computing
     - Arquitecturas distribuidas y descentralizadas (blockchain, DLT, …)
     - Ecosistemas de datos federados y espacios de datos
     - Arquitecturas de computación cuántica y tecnologías emergentes
     - Seguridad en entornos Cloud

  5. **Analítica y Visualización**:
     - Ciencia de datos y analítica avanzada
     - Tecnologías para la interoperabilidad y estandarización de datos
     - Computación espacial inteligente y gemelos digitales de territorio
     - Sistemas de información geográfica (GIS) y entornos 3D interactivos
     - Realidad extendida (AR/VR/MR) y plataformas inmersivas
     - Protección de datos sensibles en análisis masivo
     - Seguridad en plataformas de visualización inmersivas

  6. **Factor Humano**:
     - IA confiable: explicabilidad y transparencia algorítmica
     - Ética, privacidad y seguridad
     - Interacción humano-máquina (HMI) y humano-robot (HRI) centrada en la persona
     - Reducción de la brecha digital
     - Toma de conciencia en ciberseguridad para usuarios y desarrolladores
     - Diseño ético y seguro de interfaces
     - Políticas de protección de datos y gestión de riesgos

  7. **Competencias Técnicas Transversales**:
     - Gestión de proyectos tecnológicos (Scrum, Kanban, PMP)
     - DevOps y MLOps: integración y despliegue continuo
     - Arquitecturas orientadas a datos (Data Lakes, Data Mesh, plataformas seguras de integración)
     - Cumplimiento normativo y estándares internacionales
     - Computación de alto rendimiento (HPC) para simulaciones complejas
     - Automatización y robótica en entornos industriales

  ### Keywords:
  Inteligencia Artificial, Internet de las Cosas, Cloud Computing, Blockchain,
  Computación Cuántica, Ciencia de Datos, Realidad Aumentada, Realidad Virtual,
  Realidad Mixta, Gemelos Digitales, Computación Espacial Inteligente, Sistemas
  de Información Geográfica, Interoperabilidad de Datos, Seguridad en Dispositivos
  IoT, Criptografía Post-cuántica, Comunicaciones Satelitales, Redes LoRaWAN,
  Conectividad 5G/6G, Gestión de Identidades, Autenticación de Redes, Comunicaciones
  Cuánticas, Explicabilidad Algorítmica, Transparencia Algorítmica, Protección de
  Datos Sensibles, Diseño Ético de Interfaces, Políticas de Protección de Datos,
  Gestión de Riesgos, Scrum, Kanban, PMP, DevOps, MLOps, Data Lakes, Data Mesh,
  Cumplimiento Normativo, Computación de Alto Rendimiento, Automatización, Robótica Industrial

  ### Types of Projects:
  1. Research and Development (R&D): new technologies and methodologies in AI, IoT,
     Cloud, Blockchain, Quantum Computing, Data Science, AR/VR/MR, Digital Twins,
     GIS, IoT Security, Post-Quantum Cryptography, Satellite Communications,
     LoRaWAN, 5G/6G, Identity Management, Quantum Communications, DevOps, MLOps,
     Data Lakes, Data Mesh, HPC, Automation, Industrial Robotics.
  2. Innovation: applying existing technologies to healthcare, agriculture, energy,
     smart cities.
  3. Collaborative Projects: partnerships with universities, research centres,
     private companies.
  4. Pilot Projects: small-scale validation before full deployment.
  5. Consulting and Advisory: expert guidance on technology adoption.
  6. Training and Education: programs, workshops, and materials for tech professionals.
  7. Standardization and Certification: standards and certifications for quality and
     interoperability.
  8. Community and Social Impact: technology for social and environmental challenges.
  9. Infrastructure and Equipment: supporting infrastructure for R&D activities.
  10. Policy and Regulatory: influencing frameworks for technology adoption.
