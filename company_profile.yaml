# ---------------------------------------------------------------------------
# Dimensiones de triaje — el LLM puntúa cada dimensión de 0 a 5.
# Añade, elimina o edita dimensiones según la estrategia comercial.
# Los cambios surten efecto en la próxima ejecución (sin reiniciar Dagster).
# ---------------------------------------------------------------------------
triage_dimensions:
  - name: "Alineación temática"
    weight: 2.0
    description: >
      En qué medida el objeto y alcance de la licitación encajan con las áreas
      de interés estratégico de la empresa (IA, IoT, transformación digital,
      computación cuántica, salud digital, energía inteligente, etc.).

  - name: "Encaje de ámbito"
    weight: 1.0
    description: >
      Si el dominio de la licitación pertenece a uno o más campos de negocio
      declarados por la empresa (TIC, I+D+i, consultoría tecnológica, formación
      digital, estándares web, etc.).

  - name: "Condiciones de ejecución"
    weight: 1.0
    description: >
      Idoneidad global del contrato para la empresa. Considera el lugar de
      ejecución (penaliza fuera de Asturias), el plazo (penaliza menos de 2
      meses), la carga de mantenimiento (penaliza más de 1 año o asistencia
      técnica pura), y la viabilidad técnica: si los perfiles y certificaciones
      requeridos (ISO, ENS, PMI u otros) coinciden con las capacidades internas
      habituales de la empresa.

  - name: "Criterios de valoración"
    weight: 1.0
    description: >
      Si los criterios de adjudicación favorecen la calidad técnica sobre el
      precio. Penaliza cuando el peso del precio supera el 50 % de la
      puntuación total, lo que reduce el margen de diferenciación técnica.
